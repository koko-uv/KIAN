<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة مؤقتة - هجمة | الدرع السيبراني</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300FF00' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --primary-neon: #00FF00; /* أخضر نيون */
            --secondary-blue: #00FFFF; /* أزرق سماوي/تركوازي نيون */
            --accent-purple: #FF00FF; /* بنفسجي/وردي نيون */
            --dark-background: #000000;
            --dark-overlay: rgba(0, 0, 0, 0.85);
            --text-light: #E0E0E0;
            --text-glow: rgba(0, 255, 0, 0.7);
            --border-glow: rgba(0, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--dark-background);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 255, 0, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.08) 0%, transparent 25%),
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('https://source.unsplash.com/random/1920x1080/?cyberpunk,city,night,futuristic') no-repeat center center / cover;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(0,255,0,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,255,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .maintenance-container {
            background-color: var(--dark-overlay);
            border: 2px solid var(--primary-neon);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 0 50px var(--primary-neon);
            max-width: 700px;
            width: 90%;
            z-index: 1;
            animation: fadeIn 1.5s ease-out, glow-pulse 3s infinite alternate;
            position: relative;
            overflow: hidden;
        }

        .maintenance-container::before, .maintenance-container::after {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--secondary-blue), transparent);
            opacity: 0.3;
        }
        .maintenance-container::before {
            top: 10px;
            left: 0;
            width: 100%;
            height: 2px;
            animation: scan-line-h 5s infinite linear;
        }
        .maintenance-container::after {
            right: 10px;
            top: 0;
            height: 100%;
            width: 2px;
            animation: scan-line-v 5s infinite linear;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 50px var(--primary-neon); }
            100% { box-shadow: 0 0 70px var(--secondary-blue); }
        }

        @keyframes scan-line-h {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes scan-line-v {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 4.5em;
            color: var(--primary-neon);
            margin-bottom: 25px;
            text-shadow: 0 0 25px var(--primary-neon);
            animation: text-glitch 2s infinite alternate, neon-flicker 1s infinite alternate;
            letter-spacing: 3px;
        }

        @keyframes text-glitch {
            0% { text-shadow: 0 0 20px var(--primary-neon); transform: translateX(0); }
            20% { text-shadow: -3px -3px 20px var(--accent-purple); transform: translateX(3px); }
            40% { text-shadow: 3px 3px 20px var(--secondary-blue); transform: translateX(-3px); }
            60% { text-shadow: -2px 2px 20px var(--primary-neon); transform: translateX(2px); }
            80% { text-shadow: 2px -2px 20px var(--accent-purple); transform: translateX(-2px); }
            100% { text-shadow: 0 0 20px var(--primary-neon); transform: translateX(0); }
        }

        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 5px var(--primary-neon),
                    0 0 10px var(--primary-neon),
                    0 0 20px var(--primary-neon),
                    0 0 40px var(--primary-neon),
                    0 0 80px var(--primary-neon);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        p {
            font-size: 1.4em;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.8;
            opacity: 0.9;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .note-text {
            margin-top: 30px;
            font-size: 1.1em; /* Increased font size slightly */
            color: var(--accent-purple);
            opacity: 0.8; /* Increased opacity slightly */
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 8px var(--accent-purple); /* Added a subtle glow */
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .maintenance-container {
                padding: 30px;
                width: 95%;
            }
            h1 {
                font-size: 3em;
            }
            p {
                font-size: 1.1em;
            }
            .note-text {
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2em;
            }
            p {
                font-size: 0.9em;
            }
            .note-text {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <h1>[SYSTEM OFFLINE]</h1>
        <p>عذراً، نظام "هجمة" يخضع حالياً لأعمال صيانة مكثفة وتحديثات أمنية حرجة.</p>
        <p>نعمل بجد لضمان أقصى درجات الحماية والأداء عند عودتنا للخدمة.</p>
        <p class="note-text">شكرًا لتفهمكم وصبركم. سيعود الدرع السيبراني أقوى من ذي قبل.</p>
    </div>
</body>
</html>
