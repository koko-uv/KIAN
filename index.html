<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة | صيانة وتحسينات</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300FFFF' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z'/%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        /* استيراد الخطوط من Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Share+Tech+Mono&family=Tajawal:wght@400;600;700&display=swap');

        /* المتغيرات الأساسية للألوان والتأثيرات */
        :root {
            --primary-neon: #00FFFF; /* أكوا نيون للتركيز */
            --secondary-neon: #FF00FF; /* ماجنتا نيون للتمييز */
            --dark-background: #111111; /* خلفية داكنة جداً ولكن ليست سوداء بالكامل */
            --text-light: #E0E0E0; /* لون نص فاتح */
            --text-accent: #AAAAAA; /* لون نص ثانوي */
            --glitch-color-1: rgba(0, 255, 255, 0.1); /* جليتش خفيف أكوا */
            --glitch-color-2: rgba(255, 0, 255, 0.1); /* جليتش خفيف ماجنتا */
            --transition-speed: 0.3s ease-in-out; /* سرعة الانتقالات */
        }

        /* إعادة تعيين الأنماط الافتراضية للمتصفح */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            text-align: center;
        }

        body {
            background-color: var(--dark-background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-image:
                linear-gradient(rgba(17,17,17,0.95), rgba(17,17,17,0.95)), /* تراكب لوني على الخلفية */
                url('https://source.unsplash.com/random/1920x1080/?cybersecurity,abstract-code,server-room') no-repeat center center fixed;
            background-size: cover;
            animation: bg-subtle-shift 15s infinite alternate ease-in-out; /* حركة خلفية ناعمة */
        }

        /* حركة خلفية خفيفة */
        @keyframes bg-subtle-shift {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        /* تأثير شبكة خفيف أو خطوط مسح */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, transparent 0%, transparent 1px, rgba(0,255,255,0.05) 1px, rgba(0,255,255,0.05) 2px),
                repeating-linear-gradient(90deg, transparent 0%, transparent 1px, rgba(255,0,255,0.05) 1px, rgba(255,0,255,0.05) 2px);
            background-size: 5px 5px;
            opacity: 0.2; /* شفافية أعلى لتأثير أكثر هدوءاً */
            z-index: 0;
            animation: scanline 0.8s infinite steps(10); /* مسح ضوئي أبطأ */
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .maintenance-container {
            position: relative;
            z-index: 1;
            background-color: rgba(17, 17, 17, 0.9); /* خلفية الحاوية أكثر شفافية قليلاً */
            border: 2px solid var(--primary-neon); /* حدود أنحف */
            border-radius: 8px;
            padding: 45px;
            /* ظلال متوهجة لكن أقل حدة */
            box-shadow: 0 0 30px var(--primary-neon), inset 0 0 15px var(--secondary-neon);
            animation: container-glow 4s infinite alternate;
            max-width: 700px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes container-glow {
            0%, 100% { border-color: var(--primary-neon); box-shadow: 0 0 30px var(--primary-neon), inset 0 0 15px var(--secondary-neon); }
            50% { border-color: var(--secondary-neon); box-shadow: 0 0 35px var(--secondary-neon), inset 0 0 17px var(--primary-neon); }
        }

        .icon-wrapper {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .icon-wrapper img {
            width: 90px; /* حجم أيقونة معتدل */
            filter: drop-shadow(0 0 20px var(--primary-neon)); /* ظل متوهج ناعم */
            animation: icon-float 3s infinite ease-in-out;
        }

        @keyframes icon-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon-wrapper::before { /* حلقة واحدة فقط، أقل تعقيداً */
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            width: 110px;
            height: 110px;
            border: 2px dashed var(--secondary-neon);
            opacity: 0.6;
            animation: pulse-ring 2s infinite ease-out;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2em; /* حجم العنوان معتدل */
            color: var(--primary-neon);
            text-shadow: 0 0 25px var(--primary-neon), 0 0 35px var(--secondary-neon);
            margin-bottom: 25px;
            line-height: 1.2;
            letter-spacing: 1px;
            animation: text-subtle-flicker 2s infinite alternate; /* وميض نص خفيف */
        }

        /* وميض نص خفيف */
        @keyframes text-subtle-flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 25px var(--primary-neon); }
            50% { opacity: 0.98; text-shadow: 0 0 22px var(--primary-neon), 0 0 30px var(--secondary-neon); }
        }

        p {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.3em;
            color: var(--text-light);
            margin-bottom: 25px;
            line-height: 1.7;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .sub-message {
            font-size: 1.1em;
            color: var(--text-accent);
            margin-top: -15px; /* رفعها قليلاً لتكون قريبة من الفقرة */
            margin-bottom: 30px;
        }

        .countdown {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.3em; /* حجم العداد معتدل */
            color: var(--primary-neon);
            text-shadow: 0 0 18px var(--primary-neon);
            margin-top: 35px;
            direction: ltr;
            padding: 12px 0;
            border-top: 1px dashed var(--secondary-neon);
            border-bottom: 1px dashed var(--secondary-neon);
            width: 85%;
            display: inline-block;
        }
        .countdown span {
            display: inline-block;
            margin: 0 12px;
            animation: countdown-digit-glow 1.5s infinite alternate; /* توهج للأرقام */
        }

        /* توهج أرقام العداد */
        @keyframes countdown-digit-glow {
            0%, 100% { text-shadow: 0 0 18px var(--primary-neon); }
            50% { text-shadow: 0 0 25px var(--primary-neon), 0 0 10px var(--secondary-neon); }
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--text-light);
            font-size: 1.8em;
            transition: color var(--transition-speed), transform var(--transition-speed);
            text-decoration: none;
            position: relative;
            display: block;
        }

        .social-links a:hover {
            color: var(--primary-neon);
            transform: translateY(-5px) scale(1.1);
            text-shadow: 0 0 15px var(--primary-neon);
        }

        .social-links a img {
            width: 40px;
            height: 40px;
            filter: invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.3)); /* أيقونات بيضاء مع ظل ناعم */
            transition: filter var(--transition-speed);
        }

        .social-links a:hover img {
            /* تغيير لون الأيقونة وتوهجها عند التحويم */
            filter: invert(0.8) sepia(1) saturate(5) hue-rotate(140deg) drop-shadow(0 0 20px var(--primary-neon));
        }

        /* استجابة التصميم للشاشات الأصغر */
        @media (max-width: 768px) {
            .maintenance-container {
                padding: 30px;
            }
            h1 {
                font-size: 2.5em;
            }
            p {
                font-size: 1.15em;
            }
            .countdown {
                font-size: 1.8em;
                width: 90%;
            }
            .icon-wrapper img {
                width: 75px;
            }
            .icon-wrapper::before {
                width: 95px;
                height: 95px;
            }
            .social-links a img {
                width: 35px;
                height: 35px;
            }
        }

        @media (max-width: 480px) {
            .maintenance-container {
                padding: 25px;
            }
            h1 {
                font-size: 2em;
                line-height: 1.3;
            }
            p {
                font-size: 1em;
                margin-bottom: 20px;
            }
            .countdown {
                font-size: 1.4em;
                width: 95%;
            }
            .countdown span {
                margin: 0 8px;
            }
            .icon-wrapper img {
                width: 60px;
            }
            .icon-wrapper::before {
                width: 80px;
                height: 80px;
            }
            .social-links a img {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="icon-wrapper">
            <img src="https://img.icons8.com/ios-filled/100/00FFFF/settings-2.png" alt="System Upgrade Icon">
        </div>

        <h1>
            [ هجـمة ]<br>
            نُجري تحسينات على الأنظمة
        </h1>

        <p>
            عزيزنا المستخدم، نحن نعمل حالياً على تحديث البنية التحتية لمنصة **هجمة**.
            نهدف لتعزيز الأداء، الأمان، وإضافة ميزات جديدة لتحسين تجربتك.
        </p>
        <p class="sub-message">
            نعتذر عن أي إزعاج قد يسببه هذا التوقف المؤقت.
        </p>

        <div class="countdown" id="countdown-timer">
            الخدمة ستعود خلال: <span id="days">00</span> يوم | <span id="hours">00</span> ساعة | <span id="minutes">00</span> دقيقة | <span id="seconds">00</span> ثانية
        </div>

        <div class="social-links">
            <a href="https://twitter.com/YourTwitterHandle" target="_blank" title="تابع آخر التحديثات على تويتر">
                <img src="https://img.icons8.com/ios-filled/50/FFFFFF/twitterx.png" alt="Twitter">
            </a>
            <a href="https://facebook.com/YourFacebookPage" target="_blank" title="تواصل معنا عبر فيسبوك">
                <img src="https://img.icons8.com/ios-filled/50/FFFFFF/facebook-new.png" alt="Facebook">
            </a>
            <a href="mailto:support@yourdomain.com" title="أرسل لنا استفساراً">
                <img src="https://img.icons8.com/ios-filled/50/FFFFFF/mail.png" alt="Email">
            </a>
        </div>
    </div>

    <script>
        // احسب تاريخ ووقت النهاية للعد التنازلي.
        // حالياً، تم ضبطه على 24 ساعة من الآن لغرض التجربة.
        // يمكنك تغيير هذا السطر لتاريخ محدد:
        // const countDownDate = new Date("Jul 20, 2025 10:00:00").getTime(); // مثال: 20 يوليو 2025 الساعة 10 صباحاً
        const countDownDate = new Date().getTime() + (24 * 60 * 60 * 1000); // 24 ساعة من وقت التشغيل الحالي

        // تحديث العد التنازلي كل ثانية
        const x = setInterval(function() {
            const now = new Date().getTime(); // الوقت الحالي
            const distance = countDownDate - now; // الوقت المتبقي

            // حساب الأيام والساعات والدقائق والثواني
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // عرض النتائج في عناصر HTML المخصصة، مع إضافة "0" إذا كان الرقم أقل من 10
            if (document.getElementById("days")) {
                document.getElementById("days").innerHTML = (days < 10 ? "0" : "") + days;
                document.getElementById("hours").innerHTML = (hours < 10 ? "0" : "") + hours;
                document.getElementById("minutes").innerHTML = (minutes < 10 ? "0" : "") + minutes;
                document.getElementById("seconds").innerHTML = (seconds < 10 ? "0" : "") + seconds;
            }

            // إذا انتهى العد التنازلي، اعرض رسالة "الخدمة عادت!"
            if (distance < 0) {
                clearInterval(x); // إيقاف التحديث
                if (document.getElementById("countdown-timer")) {
                    document.getElementById("countdown-timer").innerHTML = "الخدمة عادت! شكراً لصبركم.";
                    document.getElementById("countdown-timer").style.color = "var(--primary-neon)";
                    document.getElementById("countdown-timer").style.textShadow = "0 0 20px var(--primary-neon)";
                }
            }
        }, 1000);
    </script>
</body>
</html>
