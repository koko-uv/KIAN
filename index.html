<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت الصيانة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        :root {
            --neon-green: #00ff9d;
            --neon-blue: #00a1ff;
            --dark-bg: #0a0a12;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(0, 161, 255, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 3rem;
            border: 1px solid var(--neon-green);
            border-radius: 5px;
            box-shadow: 0 0 30px var(--neon-green), 
                        inset 0 0 20px var(--neon-green);
            background-color: rgba(10, 10, 18, 0.9);
            max-width: 800px;
            margin: 0 auto;
            animation: border-pulse 3s infinite alternate;
        }
        
        @keyframes border-pulse {
            0% { box-shadow: 0 0 30px var(--neon-green), inset 0 0 20px var(--neon-green); }
            100% { box-shadow: 0 0 50px var(--neon-blue), inset 0 0 30px var(--neon-blue); }
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
            letter-spacing: 2px;
        }
        
        p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            line-height: 1.8;
            color: #ccc;
        }
        
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin: 3rem 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            border-radius: 5px;
            position: relative;
            animation: progress-animation 4s infinite ease-in-out;
        }
        
        @keyframes progress-animation {
            0% { width: 35%; }
            50% { width: 38%; }
            100% { width: 35%; }
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0, 255, 157, 0.05) 3px,
                rgba(0, 255, 157, 0.05) 4px
            );
            pointer-events: none;
            z-index: 2;
        }
        
        .corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid var(--neon-green);
            pointer-events: none;
        }
        
        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
        
        .countdown {
            font-size: 1.8rem;
            margin: 2rem 0;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .matrix-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            opacity: 0.3;
        }
        
        .matrix-column {
            position: absolute;
            top: 0;
            width: 20px;
            height: 100%;
            color: var(--neon-green);
            font-size: 18px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            animation: matrix-fall linear infinite;
        }
        
        @keyframes matrix-fall {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        .warning {
            color: #ff5555;
            font-weight: bold;
            margin-top: 1rem;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <div class="matrix-rain" id="matrixRain"></div>
    
    <div class="container">
        <h1>الموقع تحت الصيانة</h1>
        <p>نحن نقوم حاليًا بإجراء تحديثات كبيرة على الموقع لتحسين تجربة المستخدم وإضافة ميزات جديدة.</p>
        <p class="warning">مدة الصيانة قد تكون طويلة بسبب حجم التحديثات الجوهرية</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="countdown">
            <p>الوقت المتبقي: <span id="countdown">7 أيام 12:45:22</span></p>
        </div>
        
        <p>نعتذر للإزعاج ونشكركم على صبركم. سنعود أقوى وأفضل!</p>
    </div>

    <script>
        // إنشاء تأثير المطر الرقمي (Matrix)
        function createMatrixRain() {
            const matrixRain = document.getElementById('matrixRain');
            const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
            
            for (let i = 0; i < 30; i++) {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                column.style.left = `${Math.random() * 100}%`;
                column.style.animationDuration = `${5 + Math.random() * 15}s`;
                column.style.animationDelay = `${Math.random() * 5}s`;
                
                let content = '';
                for (let j = 0; j < 50; j++) {
                    content += chars[Math.floor(Math.random() * chars.length)];
                }
                
                column.textContent = content;
                matrixRain.appendChild(column);
            }
        }
        
        // تحديث العداد التنازلي لمدة طويلة
        function updateCountdown() {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + 7); // إضافة أسبوع للتاريخ الحالي
            
            const now = new Date();
            const diff = targetDate - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').textContent = 
                `${days} أيام ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // بدء جميع الوظائف
        window.onload = function() {
            createMatrixRain();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        };
    </script>
</body>
</html>
