<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هجمة - الموقع تحت الصيانة</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300FF00' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --primary: #00ff00; /* أخضر نيون */
            --secondary: #0066ff; /* أزرق سيبراني */
            --accent: #ff00ff; /* بنفسجي/وردي للتأكيد */
            --dark: #000000;
            --light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            overflow: hidden; /* لمنع ظهور scrollbars إذا لم تكن هناك حاجة لها */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 255, 0, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.08) 0%, transparent 25%);
        }

        /* Hacker Screen Effect - خلفية ديناميكية جذابة */
        .hacker-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15; /* زيادة الشفافية قليلاً لبروز التأثير */
            pointer-events: none;
            overflow: hidden;
            background-image: linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .hacker-screen span {
            position: absolute;
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            opacity: 0.8;
            animation: matrix-fall linear infinite, fade-out 5s forwards;
        }

        @keyframes matrix-fall {
            0% { transform: translateY(-100%); opacity: 0; }
            5% { opacity: 0.8; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        @keyframes fade-out {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .maintenance-container {
            text-align: center;
            background-color: rgba(0, 10, 20, 0.9); /* خلفية داكنة شبه شفافة للرسالة */
            border: 2px solid var(--primary); /* إطار أخضر نيون */
            border-radius: 10px;
            padding: 50px;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7), 0 0 60px rgba(0, 102, 255, 0.5); /* إضاءة قوية */
            position: relative;
            z-index: 10; /* لجعلها فوق تأثير الهاكر */
            animation: pulse-glow 2s infinite alternate; /* تأثير نبض للإطار */
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.7), 0 0 60px rgba(0, 102, 255, 0.5); border-color: var(--primary); }
            100% { box-shadow: 0 0 45px rgba(0, 255, 255, 0.8), 0 0 80px rgba(0, 255, 255, 0.6); border-color: var(--accent); }
        }

        .maintenance-icon {
            font-size: 6em;
            color: var(--accent); /* لون بنفسجي جذاب للأيقونة */
            margin-bottom: 20px;
            animation: rotate-icon 4s infinite linear; /* دوران بطيء للأيقونة */
            text-shadow: 0 0 15px var(--accent);
        }

        @keyframes rotate-icon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }


        .maintenance-container h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 3.8em;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--primary);
            animation: glitch-text-small 1.5s infinite alternate; /* تأثير glitch خفيف */
        }

        @keyframes glitch-text-small {
            0%, 100% { text-shadow: 0 0 15px var(--primary); transform: translateX(0); }
            25% { text-shadow: -1px -1px 8px var(--primary); transform: translateX(1px); }
            50% { text-shadow: 1px 1px 8px var(--primary); transform: translateX(-1px); }
            75% { text-shadow: -0.5px 0.5px 8px var(--primary); transform: translateX(0.5px); }
        }

        .maintenance-container p {
            font-size: 1.4em;
            color: var(--light);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .maintenance-container .contact-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1em;
            color: var(--secondary);
            text-shadow: 0 0 8px var(--secondary);
        }

        .maintenance-container .contact-info a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .maintenance-container .contact-info a:hover {
            color: var(--primary);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .maintenance-container {
                padding: 30px;
                margin: 20px;
            }
            .maintenance-icon {
                font-size: 4em;
            }
            .maintenance-container h1 {
                font-size: 2.2em;
                letter-spacing: 1px;
            }
            .maintenance-container p {
                font-size: 1.1em;
            }
            .maintenance-container .contact-info {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="hacker-screen" id="hackerScreen"></div>

    <div class="maintenance-container">
        <div class="maintenance-icon">⚙️</div> <h1>الموقع تحت الصيانة حالياً</h1>
        <p>نعمل حالياً على تحديث وتطوير موقع "هجمة" بالكامل لتقديم أفضل تجربة أمان سيبراني لكم.</p>
        <p>الموقع سيتم إعادته للعمل وأقوى وأكثر حماية **قريباً جداً!**</p>
        <p class="contact-info">للاستفسارات العاجلة، يرجى التواصل مع محمد عبر البريد الإلكتروني: <a href="mailto:contact@yourwebsite.com">contact@yourwebsite.com</a></p>
    </div>

    <script>
        // Hacker Screen Effect Logic
        const hackerScreen = document.getElementById('hackerScreen');
        const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/";
        const charPool = chars.split('');

        function createRandomChar() {
            const span = document.createElement('span');
            span.textContent = charPool[Math.floor(Math.random() * charPool.length)];
            span.style.left = `${Math.random() * 100}vw`;
            span.style.fontSize = `${10 + Math.random() * 20}px`;
            span.style.animationDuration = `${5 + Math.random() * 5}s`;
            span.style.animationDelay = `${-Math.random() * 5}s`; // Start some off-screen
            hackerScreen.appendChild(span);

            // Remove character after it falls to keep DOM clean
            span.addEventListener('animationend', () => {
                span.remove();
            });
        }

        // Generate characters periodically
        setInterval(createRandomChar, 50); // Adjust interval for density
    </script>
</body>
</html>
